<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Roar, kid! — built-in AI spike</title>
<style>
  body {
    max-width: 720px; margin: 0 auto; padding: 24px 20px 48px;
    background: #fbfaf6; color: #22211d;
    font: 14px/1.5 -apple-system, "Segoe UI", sans-serif;
  }
  h1 { font-size: 18px; }
  button {
    padding: 7px 14px; border: 1px solid #22211d; border-radius: 6px;
    background: #22211d; color: #fbfaf6; font: inherit; cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  pre {
    background: #fff; border: 1px solid #d8d5cc; border-radius: 8px;
    padding: 12px; white-space: pre-wrap; word-break: break-word;
    font: 12px/1.5 ui-monospace, monospace;
  }
  table { border-collapse: collapse; margin: 10px 0; }
  th, td { padding: 4px 10px; text-align: center; font-size: 13px;
           border: 1px solid #d8d5cc; }
  td.ok { background: #e4f2e4; }
  td.bad { background: #f6dedc; font-weight: 700; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
              margin: 14px 0; }
</style>
</head>
<body>
  <h1>Chrome built-in AI (Gemini Nano) — audiogram extraction spike</h1>
  <p>Runs the shipping extraction prompt + JSON schema against the on-device
  model. Default image: the synthetic test audiogram (known ground truth,
  scored /16). Or pick any report photo.</p>

  <div class="controls">
    <select id="promptSel">
      <option value="prompt-nano.txt">simplified Nano prompt</option>
      <option value="prompt.txt">shipping prompt (3-expert ToT)</option>
    </select>
    <button id="run">Run on test audiogram</button>
    <input type="file" id="photo" accept="image/*" />
    <button id="runFile" disabled>Run on chosen file</button>
  </div>

  <pre id="log">checking availability…</pre>
  <div id="result"></div>

<script src="spike.js"></script>
</body>
</html>
